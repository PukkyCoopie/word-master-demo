<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frozen Lake Original Lab</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f1116;
        color: #c9d4e4;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .wrap {
        display: grid;
        gap: 10px;
        justify-items: center;
      }
      #c {
        width: 128px;
        height: 128px;
        border-radius: 8px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      }
      .tip {
        font-size: 12px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <canvas id="c" width="128" height="128"></canvas>
      <div class="tip">Frozen Lake 原版实验页（128x128，Shadertoy 语法转换）</div>
    </div>
    <script type="module" src="/labs/frozen-lake-original.js"></script>
  </body>
</html>
